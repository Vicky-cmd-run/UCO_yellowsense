version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: yellowsense-db
    environment:
      POSTGRES_DB: yellowsense_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: yellowsense-redis
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api
    container_name: yellowsense-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/yellowsense_db
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=super-secret-key-for-poc-use-only
      - ENVIRONMENT=development
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  web:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.web
    container_name: yellowsense-web
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - api

volumes:
  pgdata:
